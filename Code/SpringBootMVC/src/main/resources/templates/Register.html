<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Register</title>
</head>

<body>

    <h2>User Registration</h2>

    <form th:action="@{/register}" th:object="${registerUser}" method="post">

        Name: <input type="text" th:field="*{name}" required><br><br>

        Email: <input type="text" th:field="*{email}" required><br><br>

        Password: <input type="password" th:field="*{password}" required><br><br>

        <button type="submit">Register</button>

    </form>

    <br>
    <a th:href="@{/login}">Already have an account? Login</a>

</body>
</html>
