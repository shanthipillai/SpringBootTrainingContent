<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            background-color: #2c3e50;
            padding: 15px 20px;
            color: white;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: #27ae60;
            border-radius: 5px;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .msg-success { color: green; }
        .msg-error { color: red; }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>MedhaLearners</h2>

    <!-- Only Sign Up link -->
    <a th:href="@{/register}">Sign Up</a>
</div>

<!-- Messages -->
<div style="text-align:center; margin-top:20px;">
    <p th:if="${registerMsg}" th:text="${registerMsg}" class="msg-success"></p>
    <p th:if="${loginError}" th:text="${loginError}" class="msg-error"></p>
</div>

<!-- LOGIN FORM ONLY -->
<div class="container">
    <div class="card">
        <h3>Sign In</h3>

        <form th:action="@{/login}" th:object="${loginUser}" method="post">
            <input type="text" placeholder="Email" th:field="*{email}" required>
            <input type="password" placeholder="Password" th:field="*{password}" required>
            <button type="submit">Login</button>
        </form>

        <br>
        <p>New user? <a th:href="@{/register}">Create account</a></p>
    </div>
</div>

</body>
</html>
