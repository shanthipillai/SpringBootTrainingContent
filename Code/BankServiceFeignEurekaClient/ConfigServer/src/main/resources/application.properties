spring.application.name=ConfigServer
server.port=8071
eureka.client.service-url.defaultZone=http://localhost:8557/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

#spring.cloud.config.server.native.search-locations=file:///E:/config-repo
#spring.profiles.active=native

spring.cloud.config.server.git.uri=https://github.com/shanthipillai/MSConfig.git
spring.cloud.config.server.git.default-label=master


management.endpoints.web.exposure.include=refresh,busrefresh,monitor

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest