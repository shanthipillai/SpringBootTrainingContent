spring.application.name=gateway-server
server.port=8557

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# ❌ DISABLE discovery locator
spring.cloud.gateway.discovery.locator.enabled=false

# Account Service
spring.cloud.gateway.routes[0].id=account-service
spring.cloud.gateway.routes[0].uri=lb://ACCOUNT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/accounts/**

# Cards Service
spring.cloud.gateway.routes[1].id=card-service
spring.cloud.gateway.routes[1].uri=lb://CARD-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/cards/**

# Loans Service
spring.cloud.gateway.routes[2].id=loan-service
spring.cloud.gateway.routes[2].uri=lb://LOAN-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/loans/**

# Debug logs
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.cloud.gateway.handler.RoutePredicateHandlerMapping=DEBUG